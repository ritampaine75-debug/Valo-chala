<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SECURE TEXT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; background: #0a0a0a; font-family: 'Inter', sans-serif; color: white; }
      #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0a0a0a; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999;
      }
      .loader {
        width: 40px; height: 40px; border: 3px solid #333;
        border-top: 3px solid #0070f3; border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .fade-out { opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="loader"></div>
      <p style="margin-top: 20px; letter-spacing: 2px; font-weight: 300;">SECURE TEXT</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.onload = () => {
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('fade-out');
        }, 1000);
      };
    </script>
  </body>
</html>
